/* ============================================================
   ROOT VARIABLES (ISOLATED - TIDAK PENGARUH CSS LAIN)
   ============================================================ */
.hanpangan-app {

  --hp-primary-light: #1a3a5e;
  --hp-primary-dark: #050f1a;
  --hp-gold: #d4a843;

   CONTAINER
   ============================================================ */

/* ============================================================

<script>
// ============================================================
//  KONFIGURASI
// ============================================================
const CSV_URL = 'data/personel.csv?t=' + Date.now();

// ============================================================
//  DOM
// ============================================================
const $ = id => document.getElementById(id);
const ds = $('selectDesa');
const ps = $('selectPersonel');
const tg = $('inputTanggal');
const jm = $('inputJam');
const ih = $('infoHari');
const lp = $('laporanDisplay');

let map = {};
let desaList = [];
let hanpangan = '';
let daftarNama = [];

const HARI = ['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
const BLN = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];

// ============================================================
//  FUNGSI BANTU
// ============================================================
function now() {
  const n = new Date();
  return {
    d: n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0'),
    j: String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0')
  };
}

function tgl(s) {
  if (!s) s = now().d;
  const p = s.split('-');
  const t = +p[0], b = +p[1]-1, h = +p[2];
  return {
    tgl: h+' '+BLN[b]+' '+t,
    hr: HARI[new Date(t,b,h).getDay()]
  };
}

// ============================================================
//  EPOCH HANPANGAN (SAMA DENGAN DUKOPS)
// ============================================================
function getHanpanganIndex(arr) {
  if (!arr || arr.length === 0) return 0;
  const today = new Date();
  const epochDays = Math.floor(today.getTime() / (24 * 60 * 60 * 1000));
  const referenceDate = new Date(2024, 0, 1);
  const epochDaysRef = Math.floor(referenceDate.getTime() / (24 * 60 * 60 * 1000));
  let offset = (0 - epochDaysRef) % arr.length;
  if (offset < 0) offset += arr.length;
  let index = (epochDays + offset) % arr.length;
  if (index < 0) index += arr.length;

  $('epochInfo').innerHTML =
    `<i class="fas fa-calculator"></i> Epoch: ${epochDays} | Ref: ${epochDaysRef} | Offset: ${offset} | Index: ${index} | <i class="fas fa-user-check"></i> ${arr[index]}`;

  return index;
}

// ============================================================
//  LOAD CSV
// ============================================================
async function loadCSV() {
  try {
    const res = await fetch(CSV_URL);
    if (!res.ok) throw new Error('CSV tidak ditemukan');
    const text = await res.text();
    const lines = text.trim().split('\n').filter(l => l.trim());
    if (lines.length < 2) throw new Error('CSV kosong');

    const header = lines[0].split(',').map(h => h.trim());
    const idxNama = header.indexOf('nama');
    const idxDesa = header.indexOf('desa');
    const idxStatus = header.indexOf('status');
    if (idxNama === -1 || idxDesa === -1) throw new Error('Format CSV salah');

    map = {};
    desaList = [];
    daftarNama = [];

    for (let i = 1; i < lines.length; i++) {
      const row = lines[i].split(',').map(c => c.trim());
      const nama = row[idxNama] || '';
      const desa = row[idxDesa] || '';
      const status = row[idxStatus] || 'Desa';
      if (nama && desa) {
        map[nama] = { desa, status };
        daftarNama.push(nama);
        if (!desaList.includes(desa)) desaList.push(desa);
      }
    }
    if (Object.keys(map).length === 0) throw new Error('Tidak ada data');

    const idx = getHanpanganIndex(daftarNama);
    hanpangan = daftarNama[idx] || '';

    // POPULATE DESA
    ds.innerHTML = '<option value="">-- Pilih Desa --</option>';
    desaList.sort().forEach(d => {
      const o = document.createElement('option');
      o.value = d;
      o.textContent = d;
      ds.appendChild(o);
    });

    // POPULATE PERSONEL
    ps.innerHTML = '<option value="">-- Auto dari Jadwal --</option>';
    daftarNama.forEach(n => {
      const o = document.createElement('option');
      o.value = n;
      o.textContent = n;
      ps.appendChild(o);
    });

    // AUTO SET
    $('hanpanganNama').innerHTML = `<i class="fas fa-user-tie"></i> ${hanpangan || '-'}`;
    $('hanpanganStatus').innerHTML = `<i class="fas fa-check-circle"></i> ${Object.keys(map).length} personel`;
    $('hanpanganStatus').className = 'status';
    $('totalPersonel').textContent = Object.keys(map).length;

    if (hanpangan) {
      const ex = [...ps.options].some(o => o.value === hanpangan);
      if (ex) ps.value = hanpangan;
    }
    if (hanpangan && map[hanpangan]) {
      const d = map[hanpangan].desa;
      const ex2 = [...ds.options].some(o => o.value === d);
      if (ex2) ds.value = d;
    }

    const { d, j } = now();
    tg.value = d;
    jm.value = j;
    const { hr } = tgl(d);
    ih.textContent = hr;

    generate();

  } catch (e) {
    $('hanpanganStatus').innerHTML = `<i class="fas fa-exclamation-triangle"></i> ${e.message}`;
    $('hanpanganStatus').className = 'status error';
    $('epochInfo').innerHTML = `<i class="fas fa-exclamation-circle"></i> Error: ${e.message}`;
    console.error(e);
  }
}

// ============================================================
//  GENERATE LAPORAN
// ============================================================
function generate() {
  const desa = ds.value;
  if (!desa || !tg.value || !jm.value) {
    lp.innerHTML = '<span class="placeholder-text"><i class="fas fa-pen"></i> Silakan isi data di atas</span>';
    lp.className = 'laporan-box empty';
    lp.contentEditable = 'false';
    return;
  }

  const { tgl: t, hr: h } = tgl(tg.value);
  const jam = jm.value.replace(':', '.');
  ih.textContent = h;

  let p = ps.value || hanpangan;
  const st = map[p]?.status || 'Desa';

  const txt = `*KORAMIL 1609-05/SUKASADA*

*Perihal : GERAKAN ANTISIPASI DARURAT PANGAN NASIONAL OLEH KORAMIL 1609-05/SUKASADA.*

*Yth. Dandim 1609/Buleleng*
Cc. Kasdim

Ijin melaporkan, Menindak lanjuti Perintah Danrem 163/WSA tentang Hanpangan pada hari ${h}, tanggal  ${t}. Satuan Koramil 1609-05/Sukasada telah melaksanakan kegiatan *GERAKAN ANTISIPASI DARURAT PANGAN NASIONAL* dalam rangka Ketahanan Pangan Nasional di wilayah Koramil 1609-05/Sukasada, dengan rincian kegiatan sbb :

A. PIPANISASI       : NIHIL

B. SUMUR BOR     : NIHIL

C. POMPANISASI : 2 Unit

D. GERAKAN ANTISIPASI DARURAT PANGAN  NASIONAL sbb :

-*Babinsa ${st} ${desa}*

Pada hari ${h}, ${t}  pukul ${jam}Wita. Babinsa ${st} ${desa}, ${p} melaksanakan  monitoring ketahanan pangan di wilayah ${st} ${desa}. Kegiatan ini dilakukan sebagai bentuk pendampingan kepada para petani setelah tanam padi dengan ketersediaan air sangat mencukupi. Monitoring ini adalah upaya mendukung program Ketahanan Pangan Nasional.

Kegiatan berjalan tertib lancar dan aman.

Demikian yang dapat kami laporkan, selanjutnya mohon petunjuk, UMP.`;

  lp.textContent = txt;
  lp.className = 'laporan-box';
  lp.contentEditable = 'true';
}

// ============================================================
//  EVENT
// ============================================================
ds.onchange = () => {
  const d = ds.value;
  const p = Object.keys(map).find(k => map[k].desa === d);
  if (p) ps.value = p;
  generate();
};

ps.onchange = () => {
  const n = ps.value;
  if (n && map[n]) {
    const d = map[n].desa;
    const ex = [...ds.options].some(o => o.value === d);
    if (ex) ds.value = d;
  }
  generate();
};

tg.oninput = () => {
  if (tg.value) {
    const { hr } = tgl(tg.value);
    ih.textContent = hr;
  } else {
    ih.textContent = '-';
  }
  generate();
};

jm.oninput = generate;

// ============================================================
//  UTILITY (WINDOW SCOPE UNTUK TOMBOL)
// ============================================================
window.resetLaporan = function() {
  ds.value = '';
  ps.value = '';
  tg.value = '';
  jm.value = '';
  ih.textContent = '-';
  lp.innerHTML = '<span class="placeholder-text"><i class="fas fa-pen"></i> Silakan isi data di atas</span>';
  lp.className = 'laporan-box empty';
  lp.contentEditable = 'false';
  toast('↺ Laporan direset', 'info');
};

function toast(msg, type = 'info') {
  const t = $('toast');
  const icons = { success: 'fa-check-circle', error: 'fa-exclamation-circle', info: 'fa-info-circle' };
  t.innerHTML = `<i class="fas ${icons[type] || icons.info}"></i> ${msg}`;
  t.className = `toast ${type}`;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 3000);
}

window.salin = function() {
  if (lp.classList.contains('empty')) return toast('⚠️ Belum ada laporan', 'error');
  navigator.clipboard.writeText(lp.textContent)
    .then(() => toast('✅ Laporan disalin!', 'success'))
    .catch(() => toast('❌ Gagal menyalin', 'error'));
};

window.bagikan = function() {
  if (lp.classList.contains('empty')) return toast('⚠️ Belum ada laporan', 'error');
  const t = lp.textContent;
  if (navigator.share) {
    navigator.share({ title: 'Laporan Hanpangan', text: t })
      .catch(() => {});
  } else {
    navigator.clipboard.writeText(t)
      .then(() => toast('📤 Laporan disalin untuk dibagikan', 'success'))
      .catch(() => toast('❌ Gagal membagikan', 'error'));
  }
};

window.refreshData = async function() {
  $('hanpanganStatus').innerHTML = `<i class="fas fa-spinner fa-spin"></i> Memuat...`;
  $('hanpanganStatus').className = 'status loading';
  $('epochInfo').innerHTML = `<i class="fas fa-spinner fa-spin"></i> Menghitung epoch...`;
  await loadCSV();
  toast('✅ Data refreshed', 'success');
};

// ============================================================
//  INSTALL BUTTON PWA
// ============================================================
let deferredPrompt;

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  const installBtn = document.getElementById('installBtn');
  if (installBtn) {
    installBtn.style.display = 'block';
    installBtn.onclick = async () => {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        if (outcome === 'accepted') {
          installBtn.style.display = 'none';
          toast('✅ Aplikasi berhasil diinstall!', 'success');
        }
        deferredPrompt = null;
      }
    };
  }
});

window.addEventListener('appinstalled', () => {
  const installBtn = document.getElementById('installBtn');
  if (installBtn) installBtn.style.display = 'none';
  deferredPrompt = null;
});

// CEK JIKA SUDAH DALAM MODE STANDALONE (PWA)
if (window.matchMedia('(display-mode: standalone)').matches) {
  const installBtn = document.getElementById('installBtn');
  if (installBtn) installBtn.style.display = 'none';
}

// ============================================================
//  START
// ============================================================
loadCSV();

//  PWA SERVICE WORKER REGISTRATION
// ============================================================
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('/Hanpangan/sw.js')
      .then(function(reg) {
        console.log('✅ Service Worker registered');
      })
      .catch(function(err) {
        console.log('❌ Service Worker registration failed:', err);
      });
  });
}
</script>
